# UBC Protocol — Pattern Schema
#
# A pattern is a known-good combination of resources that produces an
# outcome. Deployed app, learning path, care plan, research pipeline.
#
# This file is the reference spec. The executable spec lives in
# tools/src/schemas.ts as PatternSchema. Load-time validation runs in
# tools/src/patterns.ts — invalid patterns are skipped with a stderr
# error rather than silently accepted.

required:
  id: string                # Slug, lowercase kebab-case (e.g., "blog-ai", "learn-data-science")
  name: string              # Human-readable name
  description: string       # What this pattern achieves

  # At least one of `resources` or the legacy `services` must be present.
  # The loader normalizes `services` to `resources` on read, so
  # downstream code should always use `resources`.
  resources:
    - resource: string      # Resource name (must exist in the domain catalog)
      role: string          # What it does in this pattern
      reason: string        # Why this resource and not an alternative

optional:
  icon: string              # Emoji or icon name
  outcome: string           # What the person gets when the pattern is complete

  steps:                    # Ordered assembly steps (if absent, the assembler improvises)
    - name: string
      description: string
      resource: string      # Which resource this step uses
      verification: string  # How to confirm this step succeeded

  # Compute-domain convenience field. Other domains can omit this.
  builds:
    framework: string
    features: list[string]
    deploy_to: string

  estimated_effort: string  # Time/cost estimate (e.g. "30 min, $0")
  estimated_usage:          # Per-resource usage estimate (map)
    <resource-name>: string

  prerequisites: list       # What the person should know or have before starting
  alternatives: list        # Other patterns that achieve similar outcomes
  warnings: list[string]    # Gotchas
