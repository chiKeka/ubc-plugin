service: github
display_name: GitHub
category: cloud_infrastructure
signup_url: https://github.com/signup
auth_methods:
  - email_password

steps:
  - name: navigate_signup
    action: goto
    url: https://github.com/signup
    wait_for: "text=Welcome to GitHub"

  - name: enter_email
    action: fill
    selector: "input[id='email']"
    value: "{{user_email}}"
    wait_for: "text=Continue"

  - name: click_continue
    action: click
    selector: "button:has-text('Continue')"

  - name: create_password
    action: fill
    selector: "input[id='password']"
    value: "{{generated_password}}"

  - name: enter_username
    action: fill
    selector: "input[id='login']"
    value: "{{generated_username}}"

  - name: complete_signup
    action: click
    selector: "button:has-text('Continue')"

  - name: verify_email
    action: wait
    wait_for: "user_action"
    timeout_ms: 300000

credentials:
  - name: GITHUB_TOKEN
    type: api_key
    location: settings
    path: https://github.com/settings/tokens/new
    extraction:
      method: create_and_capture
      steps:
        - name: navigate_tokens
          action: goto
          url: https://github.com/settings/tokens?type=beta

        - name: click_generate
          action: click
          selector: "a:has-text('Generate new token')"

        - name: set_token_name
          action: fill
          selector: "input[id='user_programmatic_access_name']"
          value: "ubc-access-token"

        - name: set_expiration
          action: click
          selector: "select[id='user_programmatic_access_expiration']"

        - name: select_90_days
          action: click
          selector: "option[value='90']"
          optional: true

        - name: generate_token
          action: click
          selector: "button:has-text('Generate token')"

        - name: capture_token
          action: capture
          selector: "code, .token, [data-clipboard-text]"

provides:
  - code_hosting
  - ci_cd
  - container_registry
  - codespaces

free_tier:
  limits:
    - name: Actions Minutes
      value: 2000
      unit: minutes/month
    - name: Packages Storage
      value: 500
      unit: MB
    - name: Codespaces
      value: 120
      unit: core-hours/month
